# alacritty.toml — baseline excellent configuration
# Alacritty 0.13+ uses TOML format

[general]
# Import additional config files (theme overrides, etc.)
# import = ["~/.config/alacritty/theme.toml"]
live_config_reload = true

# ─── Window ───────────────────────────────────────────────────────────────────

[window]
# Padding (pixels) — keeps text off the window edges
padding = { x = 0, y = 0 }

# Cell offset adds internal line/column spacing
decorations_theme_variant = "None"  # macOS only: "Light" | "Dark" | "None"

# "None" removes the title bar + borders on supported compositors (macOS/Linux)
# decorations = "None"

# Initial window dimensions in columns × lines (0 = OS default)
dimensions = { columns = 200, lines = 50 }

# Opacity: 1.0 = fully opaque, lower = transparent (requires compositor)
opacity = 1

# Blur: only takes effect when opacity < 1.0 and compositor supports it
blur = false

# Window title
title = "Alacritty"
dynamic_title = true

# macOS-specific: hide cursor when typing
option_as_alt = "Both"  # Uncomment on macOS for proper Alt key behavior

[scrolling]
history = 50000          # lines of scrollback
multiplier = 1           # scroll speed multiplier (lines per tick)

# ─── Font ──────────────────────────────────────────────────────────────────────

[font]
# Preferred: any nerd-font patched monospace
normal      = { family = "Hack Nerd Font", style = "Regular" }
bold        = { family = "Hack Nerd Font", style = "Bold" }
italic      = { family = "Hack Nerd Font", style = "Italic" }
bold_italic = { family = "Hack Nerd Font", style = "Bold Italic" }

size = 13.5

# Extra space between lines/columns (pixels)
offset       = { x = -1, y = 0 }
glyph_offset = { x = 0, y = 0 }

# Use built-in font for box-drawing / powerline chars
builtin_box_drawing = true

# ─── Colors — Catppuccin Mocha (excellent default) ─────────────────────────────
# Swap this whole block for any other theme.

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground    = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text   = "#1e1e2e"
cursor = "#b4befe"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.footer_bar]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.selection]
text       = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

[colors.dim]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

# ─── Bell ──────────────────────────────────────────────────────────────────────

[bell]
animation = "EaseOutExpo"
duration  = 0           # 0 = disable visual bell
color     = "#ffffff"

# ─── Selection ─────────────────────────────────────────────────────────────────

[selection]
# Regex for what counts as a "word" for double-click selection
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
# Copy selected text to primary clipboard automatically
save_to_clipboard = true

# ─── Cursor ────────────────────────────────────────────────────────────────────

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval  = 500    # ms
blink_timeout   = 10     # seconds until blinking stops; 0 = never
unfocused_hollow = true
thickness = 0.15

# ─── Terminal ──────────────────────────────────────────────────────────────────

[terminal]
# Shell to launch. Unset = use $SHELL
# shell = { program = "/bin/zsh", args = ["--login"] }

# OSC 52 clipboard: "Disabled" | "OnlyCopy" | "OnlyPaste" | "CopyPaste"
osc52 = "CopyPaste"

# ─── Mouse ─────────────────────────────────────────────────────────────────────

[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse    = "Right"
action   = "ExpandSelection"

# ─── Keyboard Bindings ─────────────────────────────────────────────────────────
# Alacritty has sensible defaults; these extend them.

[keyboard]
bindings = [
  # --- Font size ---
  { key = "Equals",     mods = "Control",       action = "IncreaseFontSize" },
  { key = "Minus",      mods = "Control",       action = "DecreaseFontSize" },
  { key = "Key0",       mods = "Control",       action = "ResetFontSize"    },

  # --- Scrollback ---
  { key = "PageUp",     mods = "Shift",         action = "ScrollPageUp"     },
  { key = "PageDown",   mods = "Shift",         action = "ScrollPageDown"   },
  { key = "Home",       mods = "Shift",         action = "ScrollToTop"      },
  { key = "End",        mods = "Shift",         action = "ScrollToBottom"   },
  { key = "K",          mods = "Control|Shift", action = "ClearHistory"     },

  # --- Clipboard ---
  { key = "C",          mods = "Control|Shift", action = "Copy"             },
  { key = "V",          mods = "Control|Shift", action = "Paste"            },

  # --- Spawn new window ---
  { key = "N",          mods = "Control|Shift", action = "SpawnNewInstance" },

  # --- Shift+Enter sends distinct sequence (needed for Claude Code newlines) ---
  { key = "Return",     mods = "Shift",         chars = "\u001b[13;2u" },
]

# ─── Hints (clickable OSC 8 links + regex URL detection) ────────────────────────

[[hints.enabled]]
# Highlight URLs and open them with the system handler on key+click
command         = { program = "open" }   # macOS; Linux: "xdg-open"
hyperlinks      = true
post_processing = true
persist         = false
mouse           = { enabled = true, mods = "None" }
binding         = { key = "U", mods = "Control|Shift" }

regex = """(?i)(?:https?://|mailto:|ftp://|file://)[^\u0000-\u001F\u007F-\u009F<>"\\s{-}\\^⟨⟩`]+"""
